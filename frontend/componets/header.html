<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
    <header id="header">
        <div class="header__title">
            <span class="header-page-title">
                <a href="">
                    Home
                </a>
            </span>
            <span>></span>
            <span class="header-page-title location">
                Home
            </span>
        </div>

        <div class="header__search">
            <div class="header__search-box">
                <i class="header__search-icon"><svg  xmlns="http://www.w3.org/2000/svg" width="20" height="20"  
                fill="currentColor" viewBox="0 0 24 24" >
                <path d="M18 10c0-4.41-3.59-8-8-8s-8 3.59-8 8 3.59 8 8 8c1.85 0 3.54-.63 4.9-1.69l5.1 5.1L21.41 20l-5.1-5.1A8 8 0 0 0 18 10M4 10c0-3.31 2.69-6 6-6s6 2.69 6 6-2.69 6-6 6-6-2.69-6-6"></path>
                </svg></i>

                <input
                    class="header__search-input"
                    type="search"
                    placeholder="Search..."
                >
            </div>
        </div>

        <div class="header__user">
            <div class="header__balance">
                <div class="header__balance-icon">
                    <img src="../assents/Imagenes/Coin.svg" alt="">
                </div>

                <span
                    class="header__balance-value"
                    id="header-balance-value">
                    000
                </span>
            </div>

            <div class="header__profile">
                <div class="header__profile-image">
                    <img
                        src="../assents/Imagenes/Group 55 (1).svg"
                        alt="Foto de perfil"
                        id="header-profile-avatar"
                    >
                </div>
                <a
                    href="#"
                    class="header__profile-name"
                    id="header-profile-name">
                    Nombre  de Usuario
                </a>
            </div>
        </div>
    </header>
</html>
